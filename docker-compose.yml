services:
  websearch:
    build: .
    image: websearch:local
    ports:
      - "3040:3040"
    environment:
      WEBSEARCH_SEARXNG_BASE_URL: http://searxng:8080
      BRAVE_API_KEY: ${BRAVE_API_KEY:-}
      MOJEEK_API_KEY: ${MOJEEK_API_KEY:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
    volumes:
      - ./lenses:/app/lenses:ro
    depends_on:
      - searxng
    restart: unless-stopped

  searxng:
    image: searxng/searxng:latest
    expose:
      - "8080"
    environment:
      BASE_URL: http://localhost:8080/
      INSTANCE_NAME: websearch-local
    volumes:
      - ./searxng:/etc/searxng:rw
    restart: unless-stopped
